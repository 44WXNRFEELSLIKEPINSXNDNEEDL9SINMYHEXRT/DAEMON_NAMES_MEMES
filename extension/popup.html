<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daemon Names Memes</title>
<style>
  :root {
    --bg: #0a0808;
    --panel: #131010;
    --panel-border: #2a1414;
    --blood: #8B0000;
    --blood-bright: #b81a1a;
    --blood-dim: #4a0000;
    --text: #e8e0dc;
    --text-dim: #8a7d78;
    --mono: "Times New Roman", ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --serif: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
  }

  * { box-sizing: border-box; }

  body {
    width: 320px;
    margin: 0;
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, rgba(139,0,0,0.10) 0%, transparent 60%);
    color: var(--text);
    font-family: var(--serif);
  }

  .top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--panel-border);
  }

  .sigil { width: 20px; height: 20px; flex-shrink: 0; }

  .top h1 {
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 0;
  }

  .body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 16px; }

  .stat-block {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 2px;
    padding: 12px 14px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold !important;
  }

  .provider-chip {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--blood-bright);
    border: 1px solid var(--blood-dim);
    padding: 1px 6px;
    border-radius: 2px;
    text-transform: none;
    letter-spacing: 0;
  }

  .key-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }

  .key-value.unset { color: var(--blood-bright); }

  .bar-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }

  .bar-numbers {
    font-family: var(--mono);
    font-size: 13px;
  }

  .bar-numbers .used { color: var(--text); }
  .bar-numbers .limit { color: var(--text-dim); }

  .bar-track {
    height: 4px;
    background: #1c1616;
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--blood);
    transition: width 0.2s ease;
  }

  .bar-fill.warn { background: var(--blood-bright); }

  .preview-block {
    display: flex;
    gap: 12px;
  }

  .preview-thumb {
    width: 56px;
    height: 56px;
    border-radius: 2px;
    border: 1px solid var(--panel-border);
    background: #0d0a0a;
    flex-shrink: 0;
    object-fit: cover;
  }

  .preview-info {
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
  }

  .preview-name {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .preview-empty {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
  }

  .preview-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .count-block {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .count-number {
    font-family: var(--serif);
    font-size: 30px;
    color: var(--blood-bright);
    line-height: 1;
  }

  .count-label {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: bold !important;
  }

  .footer-link {
    text-align: center;
    padding: 4px 0 2px;
  }

  .footer-link a {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 0.06em;
    color: var(--text);
    text-decoration: none;
    font-weight: bold !important;
  }

  .footer-link a:hover { color: var(--blood-bright); }
</style>
</head>
<body>

  <div class="top">
    <svg class="sigil" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 4 L34 30 L6 30 Z" stroke="#8B0000" stroke-width="1.6"/>
      <circle cx="20" cy="22" r="4.5" stroke="#b81a1a" stroke-width="1.3"/>
    </svg>
    <h1>Daemon Names Memes</h1>
  </div>

  <div class="body">

    <div class="stat-block">
      <div class="eyebrow">
        <span>Active key</span>
        <span class="provider-chip" id="providerChip">google</span>
      </div>
      <div class="key-value" id="keyValue">—</div>
    </div>

    <div class="stat-block">
      <div class="bar-row">
        <span class="eyebrow" style="margin-bottom:0;">Rate limit</span>
        <span class="bar-numbers"><span class="used" id="rateUsed">0</span><span class="limit" id="rateLimit">/60 per min</span></span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="rateBar" style="width:0%"></div></div>
    </div>

    <div class="stat-block">
      <div class="eyebrow">Last classified</div>
      <div class="preview-block">
        <img class="preview-thumb" id="previewThumb" style="display:none;">
        <div class="preview-info" id="previewInfo">
          <span class="preview-empty">No memes classified yet</span>
        </div>
      </div>
    </div>

    <div class="stat-block count-block">
      <div>
        <div class="count-number" id="totalCount">0</div>
        <div class="count-label">Memes named</div>
      </div>
    </div>

  </div>

  <div class="footer-link">
    <a href="#" id="openOptions">Settings</a>
  </div>

<script src="popup.js"></script>
</body>
</html>
